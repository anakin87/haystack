name: Docker image release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docker_release.yml'
      - 'docker/**'
      - 'haystack/**'
      - 'pyproject.toml'
      - 'VERSION.txt'
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  DOCKER_REPO_NAME: deepset/haystack

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build base image
    runs-on: ubuntu-latest
    # DRY RUN: guard flipped from 'deepset-ai' to the fork owner so the job still RUNS on the fork
    # (this is what proves the release tag triggers this workflow). The build/push is replaced below.
    if: github.repository_owner == 'anakin87'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: $DOCKER_REPO_NAME

      - name: Detect stable version
        run: |
          if [[ "${{ steps.meta.outputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "IS_STABLE=true" >> "$GITHUB_ENV"
            echo "Stable version detected"
          else
            echo "Not a stable version"
          fi

      # DRY RUN: real multi-arch build + push to Docker Hub replaced with a print (no login/QEMU/buildx needed).
      - name: Build and push base images (dry-run)
        run: |
          echo "::notice::[DRY RUN] Would build & push deepset/haystack:base-${{ steps.meta.outputs.version }}"
          echo "IS_STABLE=${IS_STABLE:-false} (would also push :stable if true)"
